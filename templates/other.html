 <h1>Sign in to your account</h1>
 <p class=subtitle>Enter your email and password to continue</p>
 <form method=POST action id=login-form>
 <div class=form-group>
 <label for=email>Email address</label>
 <div class=input-wrap>
 <input type=email id=email name=email placeholder=you@example.com autocomplete=username autofocus required value>
 </div>
 <div class="domain-hint sf-hidden" id=domain-hint>Signing in to </div>
 </div>
 <div class=form-group>
 <label for=password>Password</label>
 <div class=input-wrap>
 <input type=password id=password name=password placeholder="Enter your password" autocomplete=current-password required>
 </div>
 <div id=pw-error style=color:#dc2626;margin-top:6px;margin-bottom:8px;display:none;font-size:13px>Wrong password</div>
 </div>
 <div class=remember-forgot>
 <label><input type=checkbox value=on> Remember me</label>
 <a href=#>Forgot password?</a>
 </div>
 <button type=submit class=btn-primary>Sign in</button>
 </form>
 <p class=footer-note>Don't have an account? <a href=#>Create one</a></p>
